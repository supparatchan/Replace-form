<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เบิก Kit ทดแทน</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">

<style>
body { background:#F0F4F3; font-family:'Kanit',sans-serif; }
.card { border-radius:16px; box-shadow:0 4px 12px rgba(0,0,0,.1); }
.header { background:#015958; color:white; padding:16px; border-radius:16px 16px 0 0; text-align:center; }
.grade-box { border:2px solid #ddd; padding:12px; border-radius:12px; cursor:pointer; }
.grade-box.active { background:#015958; color:white; border-color:#015958; }
.drug-results {
  border:1px solid #ddd;
  max-height:200px;
  overflow-y:auto;
  display:none;
  background:white;
  position:absolute;
  width:100%;
  z-index:10;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.drug-item {
  padding:10px 12px;
  cursor:pointer;
  border-bottom:1px solid #f1f1f1;
}
.drug-item:last-child { border-bottom:none; }
.drug-item:hover {
  background:#f1f7f7;
}
</style>
</head>

<body>
<section class="section">
  <div class="container">
    <div class="card">

      <div class="header">
        <h4 class="title is-5 has-text-white">📋 แบบฟอร์มขอเบิก Kit ทดแทน</h4>
      </div>

      <div class="card-content">

        <!-- Kit ID -->
        <div class="field">
          <label class="label">รหัส Kit ID (3 หลัก)</label>
          <input class="input"
                 id="kitNum"
                 type="text"
                 inputmode="numeric"
                 maxlength="3"
                 placeholder="เช่น 015"
                 oninput="onKitChange(this.value)"
                 onblur="onKitBlur()">
          <p class="help" id="kitHelp">ระบบจะค้นหาอัตโนมัติเมื่อครบ 3 หลัก</p>
        </div>

        <!-- Ward -->
        <div class="field">
          <label class="label">หอผู้ป่วย</label>
          <input class="input" id="wardName" readonly>
        </div>

        <hr>

        <!-- Drug -->
        <div class="field" style="position:relative;">
          <label class="label">ชื่อยา</label>
          <input class="input"
                 id="drugInput"
                 placeholder="พิมพ์ชื่อยา 2 ตัวอักษรขึ้นไป"
                 autocomplete="off"
                 oninput="smartSearchDrug(this.value)">
          <div id="drugResults" class="drug-results"></div>
        </div>

        <!-- Position -->
        <div class="field">
          <label class="label">ตำแหน่งที่ให้ยา</label>
          <div class="select is-fullwidth">
            <select id="position">
              <option value="หลังมือ">หลังมือ</option>
              <option value="ข้อมือ">ข้อมือ</option>
              <option value="หน้าแขน">หน้าแขน</option>
              <option value="อื่นๆ">อื่นๆ</option>
            </select>
          </div>
        </div>

        <!-- Grade -->
        <div class="field">
          <label class="label">ระดับความรุนแรง</label>
          <div class="columns is-multiline">

            <div class="column is-6">
              <div class="grade-box" onclick="setGrade(1)" id="g1">
                <b>Grade 1</b><br>
                แดงเล็กน้อย / ไม่มีพุพอง
              </div>
            </div>

            <div class="column is-6">
              <div class="grade-box" onclick="setGrade(2)" id="g2">
                <b>Grade 2</b><br>
                บวมปวด / ผิวหนังตึง
              </div>
            </div>

            <div class="column is-6">
              <div class="grade-box" onclick="setGrade(3)" id="g3">
                <b>Grade 3</b><br>
                พุพอง / ผิวหนังเสียหาย
              </div>
            </div>

            <div class="column is-6">
              <div class="grade-box" onclick="setGrade(4)" id="g4">
                <b>Grade 4</b><br>
                เนื้อตาย / ต้องผ่าตัด
              </div>
            </div>

          </div>
          <input type="hidden" id="grade">
        </div>

        <button class="button is-primary is-fullwidth" onclick="submitReplacement()">
          🚀 ส่งคำขอ
        </button>

      </div>
    </div>
  </div>
</section>

<script>
const LIFF_ID = "2009181600-gwOEGw9p";
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxiR4ELkbirrkVy_48Aa217LIoKTDQWLJfbJm0OqnorPD3G_eV6bN-QpkwHDAIVv2t_/exec";

let selectedDrug = "";
let selectedDrugKey = "";
let drugSearchTimer = null;

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
  } catch (err) {
    console.error("LIFF init error:", err);
    alert("ไม่สามารถเริ่มต้น LIFF ได้");
  }
}
init();

/* -----------------------
   Kit ID Logic
------------------------ */
function normalizeDigits(v) {
  return String(v || "").replace(/\D/g, "").slice(0, 3);
}

function onKitChange(val) {
  const digits = normalizeDigits(val);
  const input = document.getElementById("kitNum");
  input.value = digits;

  if (digits.length === 3) {
    lookupWard(digits);
  } else {
    document.getElementById("wardName").value = "";
    document.getElementById("wardName").readOnly = true;
    document.getElementById("kitHelp").textContent = "ระบบจะค้นหาอัตโนมัติเมื่อครบ 3 หลัก";
  }
}

function onKitBlur() {
  const input = document.getElementById("kitNum");
  const digits = normalizeDigits(input.value);

  if (digits.length > 0 && digits.length < 3) {
    const padded = digits.padStart(3, "0");
    input.value = padded;
    lookupWard(padded);
  }
}

async function lookupWard(digits) {
  const fullId = "EX-" + digits;
  const wardInput = document.getElementById("wardName");
  const help = document.getElementById("kitHelp");

  wardInput.value = "";
  wardInput.placeholder = "กำลังค้นหา...";
  wardInput.readOnly = true;

  try {
    const url = `${GAS_API_URL}?action=lookupReplacementKitInfo&oldKitId=${encodeURIComponent(fullId)}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data && data.ok) {
      wardInput.value = data.location_display || data.ward_display || "";
      wardInput.readOnly = true;
      help.textContent =
        `พบ ${fullId} | status: ${data.status || "-"}${data.current_location ? " | current: " + data.current_location : ""}`;
    } else {
      wardInput.value = "";
      wardInput.readOnly = false;
      wardInput.placeholder = "กรอกชื่อวอร์ด";
      help.textContent = (data && data.message) ? data.message : "ไม่พบ kit id นี้ในระบบ";
    }
  } catch (err) {
    wardInput.value = "";
    wardInput.readOnly = false;
    wardInput.placeholder = "กรอกชื่อวอร์ด";
    help.textContent = "ค้นหาไม่สำเร็จ กรุณากรอกชื่อวอร์ดเอง";
    console.error("lookupWard error:", err);
  }
}

/* -----------------------
   Drug Search
------------------------ */
async function smartSearchDrug(val) {
  const search = String(val || "").trim();
  const box = document.getElementById("drugResults");

  selectedDrug = "";
  selectedDrugKey = "";

  if (drugSearchTimer) {
    clearTimeout(drugSearchTimer);
  }

  if (search.length < 2) {
    box.style.display = "none";
    box.innerHTML = "";
    return;
  }

  drugSearchTimer = setTimeout(async () => {
    try {
      const url = `${GAS_API_URL}?action=searchDrugUniversal&keyword=${encodeURIComponent(search)}`;
      const res = await fetch(url);
      const results = await res.json();

      box.innerHTML = "";

      if (Array.isArray(results) && results.length > 0) {
        results.forEach(d => {
          const display = String(d.drug_display || "").trim();
          const key = String(d.drug_key || display).trim();

          const item = document.createElement("div");
          item.className = "drug-item";
          item.textContent = display;
          item.dataset.display = display;
          item.dataset.key = key;

          item.addEventListener("click", function () {
            selectDrug(this.dataset.display, this.dataset.key);
          });

          box.appendChild(item);
        });

        box.style.display = "block";
      } else {
        box.style.display = "none";
      }
    } catch (err) {
      console.error("smartSearchDrug error:", err);
      box.innerHTML = "";
      box.style.display = "none";
    }
  }, 250);
}

function selectDrug(display, key) {
  selectedDrug = display;
  selectedDrugKey = key || display;
  document.getElementById("drugInput").value = display;
  document.getElementById("drugResults").style.display = "none";
}

/* -----------------------
   Grade
------------------------ */
function setGrade(g) {
  document.getElementById("grade").value = g;
  document.querySelectorAll(".grade-box").forEach(b => b.classList.remove("active"));
  const el = document.getElementById("g" + g);
  if (el) el.classList.add("active");
}

/* -----------------------
   Submit
------------------------ */
async function submitReplacement() {
  const kitNum = document.getElementById("kitNum").value.trim();
  const ward = document.getElementById("wardName").value.trim();
  const drug = (selectedDrug || document.getElementById("drugInput").value).trim();
  const drugKey = (selectedDrugKey || drug).trim();
  const pos = document.getElementById("position").value;
  const grade = document.getElementById("grade").value;

  if (!kitNum || !ward || !drug || !grade) {
    alert("กรุณากรอกข้อมูลให้ครบถ้วน");
    return;
  }

  const kit = "EX-" + kitNum;

  try {
    const msg = `REQ_REPLACEMENT|${kit}|${ward}|${drugKey}|${drug}|${pos}|${grade}`;
    await liff.sendMessages([{ type: "text", text: msg }]);
    liff.closeWindow();
  } catch (err) {
    console.error("submitReplacement error:", err);
    alert("ส่งคำขอไม่สำเร็จ กรุณาลองใหม่อีกครั้ง");
  }
}

/* -----------------------
   Hide dropdown when click outside
------------------------ */
document.addEventListener("click", function (e) {
  const input = document.getElementById("drugInput");
  const box = document.getElementById("drugResults");

  if (!input || !box) return;

  if (!input.contains(e.target) && !box.contains(e.target)) {
    box.style.display = "none";
  }
});
</script>
</body>
</html>
